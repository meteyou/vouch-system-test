name: Vouch Manage by Issue

on:
  issue_comment:
    types: [created]

concurrency:
  group: vouch-manage
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v6
        with:
          ref: 'main'
          token: ${{ secrets.VOUCH_TOKEN }}

      - name: Setup Vouch CLI-Tool
        uses: mitchellh/vouch/action/setup-vouch@v1

      - name: Execute Vouch Manage CLI-Tool
        id: vouch
        env:
          GITHUB_TOKEN: ${{ secrets.VOUCH_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          # Bypass the `vouch` wrapper: it builds the nushell command with
          # `printf %q` (bash escaping), so it cannot pass multi-word arguments
          # to nushell. Call nushell directly and quote the message as a nu string.
          lib_dir="${VOUCH_LIB_DIR:-$(cd -- "$(dirname -- "$(command -v vouch)")/../.." && pwd)/vouch}"
          output=$(nu --no-config-file -c "use \"$lib_dir\" *; gh-manage-by-issue $ISSUE_NUMBER $COMMENT_ID -R $REPO --dry-run=false --commit-message='chore(vouch): update VOUCHED contributors'")
          
          echo "$output"
          echo "status=$(echo "$output" | tail -n1)" >> "$GITHUB_OUTPUT"